<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pancake</title>
  <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="static/style.css?v=20260316p">
</head>
<body>
  <div class="container">
    <h1><svg class="logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><ellipse cx="16" cy="22" rx="11" ry="3.5" fill="#d4a03c"/><rect x="5" y="19" width="22" height="3" fill="#d4a03c"/><ellipse cx="16" cy="19" rx="11" ry="3.5" fill="#e8b84a"/><ellipse cx="16" cy="17" rx="10" ry="3" fill="#c4903a"/><rect x="6" y="14.5" width="20" height="2.5" fill="#c4903a"/><ellipse cx="16" cy="14.5" rx="10" ry="3" fill="#e0a840"/><ellipse cx="16" cy="12.5" rx="9" ry="2.8" fill="#bc8838"/><rect x="7" y="10" width="18" height="2.5" fill="#bc8838"/><ellipse cx="16" cy="10" rx="9" ry="2.8" fill="#d89830"/><rect x="13" y="7.5" width="6" height="3" rx="0.8" fill="#fff3b0" opacity="0.9"/><path d="M22 12 Q24 14 23 17" stroke="#8b5e1a" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/></svg>Pancake</h1>

    <div class="section" id="active-section">
      <div class="section-header active-header" id="active-header-toggle">
        <span class="section-arrow">&#9654;</span>
        Active <span class="section-count">(0)</span>
      </div>
      <div class="section-body">
        <div class="task-list" id="active-list" data-section="active"></div>
      </div>
    </div>

    <div class="section" id="next-section">
      <div class="section-header next-header" id="next-header-toggle">
        <span class="section-arrow">&#9654;</span>
        Up Next <span class="section-count">(0)</span>
      </div>
      <div class="section-body">
        <div class="task-list" id="next-list" data-section="up_next"></div>
      </div>
    </div>

    <div class="section" id="projects-section">
      <div class="section-header projects-header" id="projects-header-toggle">
        <span class="section-arrow">&#9654;</span>
        Projects
        <span class="add-project-toggle" id="add-project-toggle" title="New project">+</span>
      </div>
      <div class="section-body">
        <div class="add-project-inline" id="add-project-inline" style="display:none">
          <input type="text" id="add-project-input" placeholder="Project name...">
        </div>
        <div id="project-list"></div>
      </div>
    </div>

    <div class="section" id="done-section">
      <div class="section-header done-header collapsible-header">
        <span class="section-arrow">&#9654;</span>
        History <span class="section-count">(0)</span>
      </div>
      <div class="section-body">
        <div class="done-search-wrapper">
          <svg class="done-search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="7" cy="7" r="5.5"/><line x1="11" y1="11" x2="14.5" y2="14.5"/>
          </svg>
          <input type="text" class="done-search-input" id="done-search-input" placeholder="Search tasks and projects...">
        </div>
        <div id="done-list"></div>
      </div>
    </div>
  </div>

  <button class="voice-fab" id="voice-fab" title="Voice input">
    <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 10a2 2 0 002-2V4a2 2 0 10-4 0v4a2 2 0 002 2z"/>
      <path d="M12 8a1 1 0 10-2 0 2 2 0 01-4 0 1 1 0 10-2 0 4 4 0 003 3.87V13H6a1 1 0 100 2h4a1 1 0 100-2H9v-1.13A4 4 0 0012 8z"/>
    </svg>
  </button>

  <div class="voice-overlay" id="voice-overlay">
    <div class="voice-overlay-content">
      <div class="voice-ripple" id="voice-ripple"></div>
      <div class="voice-transcript" id="voice-transcript">Listening...</div>
      <div class="voice-hint">Stops after 2s of silence, then sends</div>
      <button class="voice-cancel" id="voice-cancel">Cancel</button>
    </div>
  </div>

  <div class="chat-panel" id="chat-panel">
    <div class="chat-header" id="chat-header">
      <svg class="chat-header-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 1C4.13 1 1 3.69 1 7c0 1.92 1.13 3.62 2.88 4.65L3 14.5l3.38-1.69C6.9 12.93 7.44 13 8 13c3.87 0 7-2.69 7-6s-3.13-6-7-6z"/>
      </svg>
      <span class="chat-header-title">Think</span>
      <span class="chat-header-status" id="chat-status"></span>
      <button class="chat-close-btn" id="chat-close-btn" title="Close">&larr;</button>
      <button class="chat-new-btn" id="chat-new-btn" title="New conversation">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" opacity="0.7">
          <path d="M14 1H5C4.45 1 4 1.45 4 2v1H2C1.45 3 1 3.45 1 4v8c0 .55.45 1 1 1h1.5l1.5 2 1.5-2H11c.55 0 1-.45 1-1v-1h2c.55 0 1-.45 1-1V2c0-.55-.45-1-1-1zM10.5 11H6.5L5 13l-1.5-2H2.5V4.5h8V11zM13.5 9.5H12V4c0-.55-.45-1-1-1H5.5V2.5h8V9.5z"/>
        </svg>
      </button>
    </div>
    <div class="chat-body" id="chat-body">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" placeholder="What's on your mind?" rows="1"></textarea>
        <button class="chat-send" id="chat-send">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M2 1.5l12 6.5-12 6.5V9l8-1-8-1z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile FAB to open Think/chat -->
  <button class="fab-add" id="fab-add" title="Think">
    <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 1C4.13 1 1 3.69 1 7c0 1.92 1.13 3.62 2.88 4.65L3 14.5l3.38-1.69C6.9 12.93 7.44 13 8 13c3.87 0 7-2.69 7-6s-3.13-6-7-6z"/>
    </svg>
  </button>

  <script src="static/app.js?v=20260316p"></script>
</body>
</html>
